qc_1:
  - criticality: error
    check:
      arguments:
        expression: bith_date and ssn is not null
        msg: Flag if bith_date and ssn is not null and show
      function: sql_expression
    user_metadata:
      table_name: member
      unique_key: mem_key
      validation_key: bith_date and ssn
      sql_query: with cte as (
                select distinct *
                from {catalog.name}.schema_name.table_name m
                )
                select * from cte where
                cte.birth_date is null or cte.ssn is null
