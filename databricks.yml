# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: default_python
  databricks_cli_version: ">=0.298.0"
  engine: direct

artifacts:
  default:
    type: whl
    build: uv build --wheel
    path: .

variables:
  catalog_name:
    default: dev
 
  debug:
    default: "--debug"
  skip:
    default: "--skip"
  default_catalog:
    default: dev
  default_schema:
    default: template

include:
  - resources/jobs.yml


# For simplicity, we use a single workspace profile across all targets.
# Here is a good reference on how to structure your catalogs, workspaces, and groups:
# https://youtu.be/CLBq4fBE2Ro
targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: dev
 
  staging:
    workspace:
      profile: staging
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/staging/${bundle.name}
    variables:
      catalog_name: staging
    permissions:
      - service_principal_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
    run_as:
        service_principal_name: ${workspace.current_user.userName}

  prod:
    workspace:
      profile: prod
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/prod/${bundle.name}
    variables:
      catalog_name: prod
    permissions:
      - service_principal_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
    run_as:
        service_principal_name: ${workspace.current_user.userName}