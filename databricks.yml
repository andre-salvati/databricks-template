# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: default_python
  databricks_cli_version: ">=0.298.0"

artifacts:
  default:
    type: whl
    build: uv build --wheel
    path: .

variables:
  debug:
    default: "--debug"
  skip:
    default: "--skip"
  default_catalog:
    default: dev
  default_schema:
    default: template

include:
  - resources/jobs.yml


# For simplicity, we use a single workspace profile across all targets.
# Here is a good reference on how to structure your catalogs, workspaces, and groups:
# https://youtu.be/CLBq4fBE2Ro
targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: dev      

  staging:
    workspace:
      profile: staging
      root_path: /Workspace/Users/e9839ada-817e-4fc7-abb1-2554cce3fcd8/.bundle/staging/${bundle.name}
    permissions:
      - service_principal_name: e9839ada-817e-4fc7-abb1-2554cce3fcd8
        level: CAN_MANAGE
    run_as:
        service_principal_name: e9839ada-817e-4fc7-abb1-2554cce3fcd8    

  prod:
    workspace:
      profile: prod
      root_path: /Workspace/Users/e9839ada-817e-4fc7-abb1-2554cce3fcd8/.bundle/prod/${bundle.name}
    permissions:
      - service_principal_name: e9839ada-817e-4fc7-abb1-2554cce3fcd8
        level: CAN_MANAGE
    run_as:
        service_principal_name: e9839ada-817e-4fc7-abb1-2554cce3fcd8    