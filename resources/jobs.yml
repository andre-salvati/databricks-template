resources:
  jobs:
    job1:
      environments:
      - environment_key: default
        spec:
          client: '5'
          dependencies:
          - ../dist/template-*.whl
      name: template_${bundle.target}
      tags:
        git_branch: ${bundle.git.branch}
        git_origin_url: ${bundle.git.origin_url}
      tasks:
      - environment_key: default
        max_retries: 0
        python_wheel_task:
          entry_point: main
          package_name: template
          parameters:
          - --task={{task.name}}
          - --env=${bundle.target}
          - --user=${workspace.current_user.short_name}
          - --schema=raw
          - ${var.debug}
        task_key: extract_source1
      - environment_key: default
        max_retries: 0
        python_wheel_task:
          entry_point: main
          package_name: template
          parameters:
          - --task={{task.name}}
          - --env=${bundle.target}
          - --user=${workspace.current_user.short_name}
          - --schema=raw
          - ${var.debug}
        task_key: extract_source2
      - depends_on:
        - task_key: extract_source1
        - task_key: extract_source2
        environment_key: default
        max_retries: 0
        python_wheel_task:
          entry_point: main
          package_name: template
          parameters:
          - --task={{task.name}}
          - --env=${bundle.target}
          - --user=${workspace.current_user.short_name}
          - --schema=curated
          - ${var.debug}
        task_key: generate_orders
      - depends_on:
        - task_key: generate_orders
        environment_key: default
        max_retries: 0
        python_wheel_task:
          entry_point: main
          package_name: template
          parameters:
          - --task={{task.name}}
          - --env=${bundle.target}
          - --user=${workspace.current_user.short_name}
          - --schema=report
          - ${var.debug}
        task_key: generate_orders_agg
      timeout_seconds: 3600
      deployment:
        kind: BUNDLE
      run_as:
        service_principal_name: 663b9cd2-5069-4f04-a0c8-08018f81daa5
    integration_test_job:
      environments:
      - environment_key: default
        spec:
          client: '5'
          dependencies:
          - ../dist/template-*.whl
      name: template_${bundle.target}_integration_test
      tags:
        git_branch: ${bundle.git.branch}
        git_origin_url: ${bundle.git.origin_url}
      tasks:
      - environment_key: default
        max_retries: 0
        python_wheel_task:
          entry_point: main
          package_name: template
          parameters:
          - --task={{task.name}}
          - --env=${bundle.target}
          - --user=${workspace.current_user.short_name}
          - --schema=external_source
          - ${var.debug}
        task_key: setup
      - depends_on:
        - task_key: setup
        run_job_task:
          job_id: ${resources.jobs.job1.id}
        task_key: run
      - depends_on:
        - task_key: run
        environment_key: default
        max_retries: 0
        python_wheel_task:
          entry_point: main
          package_name: template
          parameters:
          - --task={{task.name}}
          - --env=${bundle.target}
          - --user=${workspace.current_user.short_name}
          - --schema=report
          - ${var.debug}
        task_key: validate
      timeout_seconds: 3600
